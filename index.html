<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <title>Beast Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <main id="app">

    <!-- Hero strip — countdown + phase chip -->
    <header class="hero">
      <div class="hero-row">
        <div class="hero-left">
          <span class="kicker">Spartan Beast</span>
          <span class="hero-meta" id="hero-meta">— · —</span>
        </div>
        <div class="hero-right">
          <span class="count-big" id="days-to-beast">—</span>
          <span class="count-lbl">days</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="phase-progress"></div></div>
    </header>

    <!-- Daily non-negotiables (pick any day this week) -->
    <section class="card daily" id="daily-card">
      <header class="card-head">
        <h2>Daily</h2>
        <div class="streak" id="streak">🔥 <span id="streak-num">—</span></div>
      </header>
      <div class="daily-strip" id="daily-strip"></div>
      <p class="card-sub" id="daily-sub">loading…</p>
      <ul class="checks" id="daily-list"></ul>
    </section>

    <!-- This week's menu -->
    <section class="card week" id="week-card">
      <header class="card-head">
        <h2>This week</h2>
        <span class="card-sub" id="week-range">—</span>
      </header>
      <div class="week-grid" id="week-grid"></div>
      <div class="week-foot">
        <span id="week-stats">— done</span>
        <button class="btn-ghost" id="add-session-btn">+ Add session</button>
      </div>
    </section>

    <!-- Add session modal -->
    <div class="modal-overlay" id="add-modal">
      <div class="modal">
        <h3>Add session</h3>
        <label>Day</label>
        <select id="add-day"></select>
        <label>Session</label>
        <select id="add-session">
          <option value="X3 Push">X3 Push</option>
          <option value="X3 Pull">X3 Pull</option>
          <option value="Long Run">Long Run</option>
          <option value="Bouldering">Bouldering</option>
          <option value="Cardio + Grip">Cardio + Grip</option>
          <option value="Posterior Chain + Farmer's Carry">Posterior Chain + Farmer's Carry</option>
          <option value="Mixed Block + Bear-Hug">Mixed Block + Bear-Hug</option>
          <option value="Daily NN">Daily NN</option>
          <option value="Bonus">Bonus</option>
        </select>
        <label>Tier</label>
        <select id="add-tier">
          <option value="Floor">Floor</option>
          <option value="Standard" selected>Standard</option>
          <option value="Bonus">Bonus</option>
        </select>
        <div class="modal-actions">
          <button class="btn-ghost" id="cancel-add-btn">Cancel</button>
          <button class="btn-primary" id="save-add-btn">Add</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <a class="footer-link" href="https://www.notion.so/3696780ba3928160a6bcf68b117fd84b" target="_blank" rel="noopener">📘 Plan</a>
      <a class="footer-link" href="https://www.notion.so/36c6780ba392817fa249dbc7edbbb973" target="_blank" rel="noopener">🛡 Tracking DBs</a>
      <span class="sync-dot" id="sync-dot" title="sync status"></span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
